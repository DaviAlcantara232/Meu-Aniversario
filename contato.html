<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato • Davi 15 anos</title>

  <style>
    :root {
      --neon: #39ff14;
      --dark: #020817;
      --light: #f9fafb;
      --muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI";
      background: radial-gradient(circle at top, #022c22 0, var(--dark) 45%, black);
      color: var(--light);
      overflow-x: hidden;
      position: relative;
    }

    /* Fundo neon */
    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(57,255,20,.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(34,197,94,.4), transparent 55%);
      animation: pulse 7s infinite alternate ease-in-out;
      z-index: -2;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: .5; }
      100% { transform: scale(1.15); opacity: 1; }
    }

    /* Linhas */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom,
        rgba(57,255,20,.05) 0px,
        rgba(57,255,20,.05) 1px,
        transparent 3px);
      animation: scan 10s linear infinite;
      opacity: .6;
      z-index: -1;
    }

    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Conteúdo */
    .page-wrap {
      opacity: 0;
      visibility: hidden;
      transition: opacity .6s ease-out;
      padding: 40px 20px;
      min-height: 100vh;
      text-align: center;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      text-shadow: 0 0 16px var(--neon);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 14px var(--neon); }
      100% { text-shadow: 0 0 30px var(--neon); }
    }

    .card {
      margin: 30px auto;
      max-width: 520px;
      padding: 25px;
      background: rgba(3,7,18,.85);
      border-radius: 20px;
      border: 1px solid rgba(57,255,20,.5);
      backdrop-filter: blur(10px);
      text-align: left;
    }

    .info {
      font-size: 1rem;
      margin: 10px 0;
      color: var(--light);
    }

    a.contact-link {
      color: var(--neon);
      font-weight: 600;
      text-decoration: none;
    }

    .btn-back {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(3,7,18,.8);
      color: var(--light);
      border: 1px solid rgba(57,255,20,.5);
      text-transform: uppercase;
      letter-spacing: .1em;
      text-decoration: none;
      transition: .2s;
    }

    .btn-back:hover {
      background: rgba(57,255,20,.2);
      box-shadow: 0 0 16px var(--neon);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .12em;
    }
  </style>
</head>

<body>

  <div id="loader" class="loader-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">conectando...</div>
  </div>

  <main id="page" class="page-wrap">

    <h1 class="title">Redes & Contato</h1>

    <div class="card">

      <p class="info">📧 E-mail:</p>
      <p class="info">
        <a class="contact-link" href="mailto:davi.castro.alcantara@gmail.com">
          davi.castro.alcantara@gmail.com
        </a>
      </p>

      <p class="info">📱 Instagram: Davi Castro de Alcântara</p>
      <p class="info">
        <a class="contact-link" href="https://instagram.com/" target="_blank">
          @dav.ialcantara
        </a>
      </p>

      <p class="info">📡 Envie uma mensagem:</p>
      <p class="info">
        <a class="contact-link" href="https://wa.me/55" target="_blank">
          WhatsApp: +55 11 95442-4947
        </a>
      </p>

    </div>

    <a href="index.html" class="btn-back">⬅ Voltar</a>

    <footer>contato • davi 15 anos • vibe neon gamer</footer>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loader = document.getElementById("loader");
      const page = document.getElementById("page");

      setTimeout(() => {
        loader.style.display = "none";
        page.style.visibility = "visible";
        page.style.opacity = "1";
      }, 500);
    });
  </script>

</body>
</html>

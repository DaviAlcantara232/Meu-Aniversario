<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contagem Regressiva - 15 anos do Davi</title>

  <style>
    /* 🔥 Fundo futurista animado */
    body {
      background: #020817;
      background: linear-gradient(135deg, #000 0%, #081524 100%);
      overflow-x: hidden;
      position: relative;
      margin: 0;
      font-family: Arial, system-ui;
      text-align: center;
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,255,90,0.12) 0%, rgba(0,0,0,0) 60%);
      animation: pulse 6s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.2); opacity: 0.7; }
    }

    /* Linhas digitais */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 255, 120, 0.05) 0px,
        rgba(0, 255, 120, 0.05) 1px,
        transparent 2px
      );
      animation: moveLines 10s linear infinite;
      pointer-events: none;
    }

    @keyframes moveLines {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }

    /* ✨ Animação de entrada */
    .fade-in {
      animation: fadeIn 1.2s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 🌟 Título Neon */
    .neon-title {
      font-size: 2rem;
      margin-top: 40px;
      color: #ffffff;
      text-shadow:
        0 0 8px #39ff14,
        0 0 16px #39ff14,
        0 0 32px #39ff14;
      animation: neonPulse 2.5s infinite alternate ease-in-out;
    }

    @keyframes neonPulse {
      0% { text-shadow: 0 0 8px #39ff14; }
      100% { text-shadow: 0 0 20px #39ff14, 0 0 40px #39ff14; }
    }

    /* Navegação */
    a {
      color: #39ff14;
      font-weight: bold;
      text-decoration: none;
      display: block;
      margin: 10px 0;
      font-size: 1.1rem;
    }
  </style>
</head>

<body class="fade-in">

  <h1 class="neon-title">🎉 Contagem Regressiva para os 15 anos do Davi</h1>
  <p id="contador" style="font-size: 1.3rem; margin-top: 10px;">Carregando...</p>

  <h2 style="margin-top: 30px; font-size: 1.7rem;">📌 Navegação</h2>

  <a href="sobre.html">Sobre Mim</a>
  <a href="importancia.html">Importância do Aniversário</a>
  <a href="convite.html">Convite Oficial</a>
  <a href="presentes.html">Lista de Presentes</a>
  <a href="festa.html">Detalhes da Festa</a>
  <a href="contato.html">Redes & Contato</a>
  <a href="download.html">Downloads</a>

<script>
  function atualizar() {
    const alvo = new Date("2026-04-01T00:00:00").getTime();
    const agora = Date.now();
    const diff = alvo - agora;

    if(diff <= 0){ document.getElementById('contador').textContent = "🎂 É HOJE!"; return; }

    const d = Math.floor(diff / (1000*60*60*24));
    document.getElementById('contador').textContent = d + " dias restantes";
  }
  atualizar();
  setInterval(atualizar, 60000);
</script>

</body>
</html>

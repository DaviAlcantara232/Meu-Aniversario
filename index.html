<script>
  function atualizar() {
    const alvo = new Date("2026-04-01T00:00:00").getTime();
    const agora = Date.now();
    const diff = alvo - agora;

    if(diff <= 0){ document.getElementById('contador').textContent = "🎂 É HOJE!"; return; }

    const d = Math.floor(diff / (1000*60*60*24));
    document.getElementById('contador').textContent = d + " dias restantes";
  }
  atualizar();
  setInterval(atualizar, 60000);
</script>
